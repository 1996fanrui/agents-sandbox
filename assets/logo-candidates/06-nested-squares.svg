<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Nested squares: isolation layers with agent cursor in center -->
  <defs>
    <linearGradient id="g6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
  </defs>
  <!-- Outermost square - host boundary -->
  <rect x="40" y="40" width="432" height="432" rx="24" fill="none" stroke="#EC4899" stroke-width="6" opacity="0.3"/>
  <!-- Middle square - isolation layer -->
  <rect x="90" y="90" width="332" height="332" rx="20" fill="none" stroke="#EC4899" stroke-width="5" opacity="0.5" stroke-dasharray="16,8"/>
  <!-- Inner square - sandbox -->
  <rect x="140" y="140" width="232" height="232" rx="16" fill="#500724" stroke="#F472B6" stroke-width="4"/>
  <!-- Terminal header -->
  <rect x="140" y="140" width="232" height="36" rx="16" fill="#831843"/>
  <rect x="140" y="160" width="232" height="16" rx="0" fill="#831843"/>
  <circle cx="162" cy="158" r="5" fill="#F87171"/>
  <circle cx="180" cy="158" r="5" fill="#FBBF24"/>
  <circle cx="198" cy="158" r="5" fill="#34D399"/>
  <!-- Agent cursor: > _ -->
  <text x="170" y="240" font-family="monospace" font-weight="bold" font-size="48" fill="#F472B6">&gt;_</text>
  <!-- Running indicator dots -->
  <circle cx="220" cy="300" r="6" fill="#F472B6" opacity="0.4"/>
  <circle cx="248" cy="300" r="6" fill="#F472B6" opacity="0.6"/>
  <circle cx="276" cy="300" r="6" fill="#F472B6" opacity="0.8"/>
  <circle cx="304" cy="300" r="6" fill="#F472B6" opacity="1.0"/>
  <!-- Corner lock icons -->
  <g transform="translate(52,52)">
    <rect x="0" y="6" width="16" height="14" rx="3" fill="none" stroke="#EC4899" stroke-width="2" opacity="0.5"/>
    <path d="M3,6 L3,3 Q3,0 8,0 Q13,0 13,3 L13,6" fill="none" stroke="#EC4899" stroke-width="2" opacity="0.5"/>
  </g>
  <g transform="translate(444,52)">
    <rect x="0" y="6" width="16" height="14" rx="3" fill="none" stroke="#EC4899" stroke-width="2" opacity="0.5"/>
    <path d="M3,6 L3,3 Q3,0 8,0 Q13,0 13,3 L13,6" fill="none" stroke="#EC4899" stroke-width="2" opacity="0.5"/>
  </g>
  <g transform="translate(52,444)">
    <rect x="0" y="6" width="16" height="14" rx="3" fill="none" stroke="#EC4899" stroke-width="2" opacity="0.5"/>
    <path d="M3,6 L3,3 Q3,0 8,0 Q13,0 13,3 L13,6" fill="none" stroke="#EC4899" stroke-width="2" opacity="0.5"/>
  </g>
  <g transform="translate(444,444)">
    <rect x="0" y="6" width="16" height="14" rx="3" fill="none" stroke="#EC4899" stroke-width="2" opacity="0.5"/>
    <path d="M3,6 L3,3 Q3,0 8,0 Q13,0 13,3 L13,6" fill="none" stroke="#EC4899" stroke-width="2" opacity="0.5"/>
  </g>
</svg>
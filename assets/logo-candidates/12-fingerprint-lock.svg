<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fingerprint-style concentric paths forming a padlock -->
  <defs>
    <linearGradient id="g12" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="#2E1065"/>
  <!-- Concentric arcs (fingerprint/isolation layers) -->
  <path d="M256,400 Q120,400 120,256" fill="none" stroke="#A855F7" stroke-width="5" stroke-linecap="round" opacity="0.25"/>
  <path d="M256,370 Q150,370 150,256 Q150,142 256,142" fill="none" stroke="#A855F7" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
  <path d="M256,340 Q180,340 180,256 Q180,172 256,172 Q332,172 332,256" fill="none" stroke="#A855F7" stroke-width="5" stroke-linecap="round" opacity="0.50"/>
  <path d="M256,310 Q210,310 210,256 Q210,202 256,202 Q302,202 302,256 Q302,310 256,310" fill="none" stroke="#A855F7" stroke-width="5" stroke-linecap="round" opacity="0.70"/>
  <path d="M256,400 Q392,400 392,256 Q392,112 256,112" fill="none" stroke="#A855F7" stroke-width="5" stroke-linecap="round" opacity="0.25"/>
  <!-- Center keyhole/agent -->
  <circle cx="256" cy="240" r="24" fill="url(#g12)"/>
  <rect x="248" y="240" width="16" height="36" rx="4" fill="url(#g12)"/>
  <!-- Status ring -->
  <circle cx="256" cy="256" r="50" fill="none" stroke="#C084FC" stroke-width="2" stroke-dasharray="6,4"/>
</svg>
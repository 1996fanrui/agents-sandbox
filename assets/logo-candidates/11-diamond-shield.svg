      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>
  </defs>
  <!-- Outer diamond -->
  <polygon points="256,32 480,256 256,480 32,256" fill="#083344" stroke="#06B6D4" stroke-width="5"/>
  <!-- Middle diamond -->
  <polygon points="256,80 432,256 256,432 80,256" fill="none" stroke="#06B6D4" stroke-width="2" stroke-dasharray="10,6" opacity="0.4"/>
  <!-- Inner diamond -->
  <polygon points="256,128 384,256 256,384 128,256" fill="#164E63" stroke="#22D3EE" stroke-width="3"/>

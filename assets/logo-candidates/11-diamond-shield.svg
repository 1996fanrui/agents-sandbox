  <circle cx="222" cy="222" r="3" fill="#FBBF24"/>
  <circle cx="234" cy="222" r="3" fill="#34D399"/>
  <!-- Terminal content -->
  <text x="210" y="262" font-family="monospace" font-size="16" fill="#67E8F9">$ sandbox</text>
  <text x="210" y="282" font-family="monospace" font-size="16" fill="#22D3EE">ready ✓</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Double border: outer=host wall, inner=sandbox. Gap=isolation -->
  <rect x="40" y="40" width="432" height="432" rx="32" fill="none" stroke="#64748B" stroke-width="6"/>
  <rect x="96" y="96" width="320" height="320" rx="20" fill="none" stroke="#3B82F6" stroke-width="6"/>
  <!-- Dashed isolation gap indicators -->
  <line x1="68" y1="160" x2="96" y2="160" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="68" y1="256" x2="96" y2="256" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="68" y1="352" x2="96" y2="352" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="416" y1="160" x2="444" y2="160" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="416" y1="256" x2="444" y2="256" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="416" y1="352" x2="444" y2="352" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Terminal cursor in center -->
  <text x="200" y="272" font-family="monospace" font-weight="bold" font-size="56" fill="#3B82F6">&gt;_</text>
</svg>
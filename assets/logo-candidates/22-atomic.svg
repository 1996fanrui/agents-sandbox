<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Atomic model: electron orbits = isolation layers, nucleus = agent -->
  <defs>
    <linearGradient id="g22" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="96" fill="#0C1929"/>
  <!-- Orbit 1 -->
  <ellipse cx="256" cy="256" rx="190" ry="70" fill="none" stroke="#06B6D4" stroke-width="3" opacity="0.4" transform="rotate(0,256,256)"/>
  <!-- Orbit 2 -->
  <ellipse cx="256" cy="256" rx="190" ry="70" fill="none" stroke="#06B6D4" stroke-width="3" opacity="0.4" transform="rotate(60,256,256)"/>
  <!-- Orbit 3 -->
  <ellipse cx="256" cy="256" rx="190" ry="70" fill="none" stroke="#06B6D4" stroke-width="3" opacity="0.4" transform="rotate(120,256,256)"/>
  <!-- Electrons -->
  <circle cx="446" cy="256" r="10" fill="#22D3EE"/>
  <circle cx="159" cy="88" r="10" fill="#22D3EE"/>
  <circle cx="159" cy="424" r="10" fill="#22D3EE"/>
  <!-- Nucleus = agent -->
  <circle cx="256" cy="256" r="50" fill="url(#g22)"/>
  <circle cx="256" cy="256" r="38" fill="#083344"/>
  <!-- Terminal in nucleus -->
  <text x="232" y="266" font-family="monospace" font-weight="bold" font-size="28" fill="#67E8F9">&gt;_</text>
  <!-- Glow -->
  <circle cx="256" cy="256" r="55" fill="none" stroke="#22D3EE" stroke-width="1" opacity="0.3"/>
</svg>
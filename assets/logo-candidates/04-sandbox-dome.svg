<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Glass dome over agent - protection metaphor -->
  <defs>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="g4b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- Base platform -->
  <ellipse cx="256" cy="380" rx="180" ry="40" fill="#134E4A"/>
  <rect x="76" y="360" width="360" height="20" rx="0" fill="#134E4A"/>
  <!-- Dome -->
  <path d="M96,360 Q96,100 256,80 Q416,100 416,360" fill="url(#g4b)" stroke="#5EEAD4" stroke-width="3"/>
  <!-- Grid lines on dome -->
  <path d="M140,360 Q140,160 256,120 Q372,160 372,360" fill="none" stroke="#5EEAD4" stroke-width="1" opacity="0.3"/>
  <path d="M186,360 Q186,200 256,160 Q326,200 326,360" fill="none" stroke="#5EEAD4" stroke-width="1" opacity="0.3"/>
  <path d="M96,300 Q256,240 416,300" fill="none" stroke="#5EEAD4" stroke-width="1" opacity="0.3"/>
  <path d="M116,240 Q256,170 396,240" fill="none" stroke="#5EEAD4" stroke-width="1" opacity="0.3"/>
  <!-- Robot agent inside dome -->
  <!-- Head -->
  <rect x="226" y="220" width="60" height="50" rx="10" fill="url(#g4)"/>
  <!-- Eyes -->
  <circle cx="244" cy="242" r="7" fill="#F0FDFA"/>
  <circle cx="268" cy="242" r="7" fill="#F0FDFA"/>
  <circle cx="244" cy="242" r="3" fill="#134E4A"/>
  <circle cx="268" cy="242" r="3" fill="#134E4A"/>
  <!-- Antenna -->
  <line x1="256" y1="220" x2="256" y2="200" stroke="#5EEAD4" stroke-width="3"/>
  <circle cx="256" cy="196" r="6" fill="#5EEAD4"/>
  <!-- Body -->
  <rect x="220" y="275" width="72" height="60" rx="8" fill="url(#g4)"/>
  <!-- Arms -->
  <rect x="196" y="280" width="20" height="40" rx="6" fill="#0F766E"/>
  <rect x="296" y="280" width="20" height="40" rx="6" fill="#0F766E"/>
  <!-- Legs -->
  <rect x="232" y="338" width="18" height="24" rx="4" fill="#0F766E"/>
  <rect x="262" y="338" width="18" height="24" rx="4" fill="#0F766E"/>
</svg>
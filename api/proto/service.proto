syntax = "proto3";

package agbox.v1;

option go_package = "github.com/1996fanrui/agents-sandbox/api/generated/agboxv1;agboxv1";

import "google/protobuf/timestamp.proto";

service SandboxService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc CreateSandbox(CreateSandboxRequest) returns (CreateSandboxResponse);
  rpc GetSandbox(GetSandboxRequest) returns (GetSandboxResponse);
  rpc ListSandboxes(ListSandboxesRequest) returns (ListSandboxesResponse);
  rpc ResumeSandbox(ResumeSandboxRequest) returns (AcceptedResponse);
  rpc StopSandbox(StopSandboxRequest) returns (AcceptedResponse);
  rpc DeleteSandbox(DeleteSandboxRequest) returns (AcceptedResponse);
  rpc DeleteSandboxes(DeleteSandboxesRequest) returns (DeleteSandboxesResponse);
  rpc SubscribeSandboxEvents(SubscribeSandboxEventsRequest) returns (stream SandboxEvent);
  rpc CreateExec(CreateExecRequest) returns (CreateExecResponse);
  rpc CancelExec(CancelExecRequest) returns (AcceptedResponse);
  rpc GetExec(GetExecRequest) returns (GetExecResponse);
  rpc ListActiveExecs(ListActiveExecsRequest) returns (ListActiveExecsResponse);
}

enum SandboxState {
  SANDBOX_STATE_UNSPECIFIED = 0;
  SANDBOX_STATE_PENDING = 1;
  SANDBOX_STATE_READY = 2;
  SANDBOX_STATE_FAILED = 3;
  SANDBOX_STATE_STOPPED = 4;
  SANDBOX_STATE_DELETING = 5;
  SANDBOX_STATE_DELETED = 6;
}

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  SANDBOX_ACCEPTED = 1;
  SANDBOX_PREPARING = 2;
  SANDBOX_READY = 3;
  SANDBOX_FAILED = 4;
  SANDBOX_STOP_REQUESTED = 5;
  SANDBOX_STOPPED = 6;
  SANDBOX_DELETE_REQUESTED = 7;
  SANDBOX_DELETED = 8;
  EXEC_STARTED = 9;
  EXEC_FINISHED = 10;
  EXEC_FAILED = 11;
  EXEC_CANCELLED = 12;
  SANDBOX_SERVICE_READY = 13;
  SANDBOX_SERVICE_FAILED = 14;
}

enum ExecState {
  EXEC_STATE_UNSPECIFIED = 0;
  EXEC_STATE_RUNNING = 1;
  EXEC_STATE_FINISHED = 2;
  EXEC_STATE_FAILED = 3;
  EXEC_STATE_CANCELLED = 4;
}

message PingRequest {}

message PingResponse {
  string version = 1;
  string daemon = 2;
}

message KeyValue {
  string key = 1;
  string value = 2;
}

message MountSpec {
  string source = 1;
  string target = 2;
  bool writable = 3;
}

message CopySpec {
  string source = 1;
  string target = 2;
  repeated string exclude_patterns = 3;
}

message HealthcheckConfig {
  repeated string test = 1;
  string interval = 2;
  string timeout = 3;
  uint32 retries = 4;
  string start_period = 5;
  string start_interval = 6;
}

message ServiceSpec {
  string name = 1;
  string image = 2;
  repeated KeyValue environment = 3;
  HealthcheckConfig healthcheck = 4;
  repeated string post_start_on_primary = 5;
}

message CreateSpec {
  string image = 1;
  repeated MountSpec mounts = 2;
  repeated CopySpec copies = 3;
  repeated string builtin_resources = 4;
  repeated ServiceSpec required_services = 5;
  repeated ServiceSpec optional_services = 6;
  map<string, string> labels = 7;
  repeated KeyValue envs = 8;
}

message SandboxHandle {
  string sandbox_id = 1;
  SandboxState state = 2;
  uint64 last_event_sequence = 3;
  repeated ServiceSpec required_services = 4;
  repeated ServiceSpec optional_services = 5;
  map<string, string> labels = 6;
}

message SandboxEvent {
  string event_id = 1;
  uint64 sequence = 2;
  string sandbox_id = 3;
  EventType event_type = 4;
  google.protobuf.Timestamp occurred_at = 5;
  bool replay = 6;
  bool snapshot = 7;
  string phase = 8;
  string error_code = 9;
  string error_message = 10;
  string reason = 11;
  string exec_id = 12;
  int32 exit_code = 13;
  SandboxState sandbox_state = 14;
  ExecState exec_state = 15;
  string service_name = 16;
}

message ExecStatus {
  string exec_id = 1;
  string sandbox_id = 2;
  ExecState state = 3;
  repeated string command = 4;
  string cwd = 5;
  repeated KeyValue env_overrides = 6;
  int32 exit_code = 7;
  string error = 8;
  uint64 last_event_sequence = 9;
}

message CreateSandboxRequest {
  CreateSpec create_spec = 1;
  string sandbox_id = 2;
  bytes config_yaml = 3;
}

message CreateSandboxResponse {
  string sandbox_id = 1;
  SandboxState initial_state = 2;
}

message GetSandboxRequest {
  string sandbox_id = 1;
}

message GetSandboxResponse {
  SandboxHandle sandbox = 1;
}

message ListSandboxesRequest {
  bool include_deleted = 1;
  map<string, string> label_selector = 2;
}

message ListSandboxesResponse {
  repeated SandboxHandle sandboxes = 1;
}

message ResumeSandboxRequest {
  string sandbox_id = 1;
}

message StopSandboxRequest {
  string sandbox_id = 1;
}

message DeleteSandboxRequest {
  string sandbox_id = 1;
}

message DeleteSandboxesRequest {
  map<string, string> label_selector = 1;
}

message DeleteSandboxesResponse {
  repeated string deleted_sandbox_ids = 1;
  uint32 deleted_count = 2;
}

message AcceptedResponse {
  bool accepted = 1;
}

message SubscribeSandboxEventsRequest {
  string sandbox_id = 1;
  uint64 from_sequence = 2;
  bool include_current_snapshot = 3;
}

message CreateExecRequest {
  string sandbox_id = 1;
  repeated string command = 2;
  string cwd = 3;
  repeated KeyValue env_overrides = 4;
  string exec_id = 5;
}

message CreateExecResponse {
  string exec_id = 1;
  string stdout_log_path = 2;
  string stderr_log_path = 3;
}

message CancelExecRequest {
  string exec_id = 1;
}

message GetExecRequest {
  string exec_id = 1;
}

message GetExecResponse {
  ExecStatus exec = 1;
}

message ListActiveExecsRequest {
  string sandbox_id = 1;
}

message ListActiveExecsResponse {
  repeated ExecStatus execs = 1;
}
